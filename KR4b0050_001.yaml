body:
  text: 卷一九日侍宴九日侍宴月殿風轉層臺氣寒高雲斂色遙露已團式詔司警言戾秋巒輕觴時薦落英可餐類聚四詩紀五十六侍皇太子釋奠宴霜輕流日風送夕雲雕檐結綵綺井生文四璉合旨八簋舒芬類聚三十八詩紀五十六遊後園託性本禽魚棲情間物外蘿徑轉連綿松軒方杳藹丘壑每淹留風雲多賞會類聚六十五詩紀五十六行宅並序余稟性端疏屬愛間外往歲羈役浙東備歷江山之美名都勝境極盡登臨山原石道步步新情回池絶澗往往舊識以吟以詠聊用述心訪宇北山阿卜居西野外幼賞悅禽魚早性羡蓬艾類聚六十四詩紀五十六登山望雷居士精舍同沈右衛過劉先生墓下作並序登山望雷居士精舍同沈右衛過劉先生墓下作並序沛國劉子圭學優未仕跡邇心遐履信體仁古之遺德潛舟迅景滅賞淪輝言念芳猷式懷嗟述屬舍弟隨郡有示來篇彌縝久要之情益深宿草之歎升望西山率爾為答雖因事雷生實申悲劉子云爾漢陵淹館蕪晉殄洙風缺五都聲論空三河文義絶興禮邁前英談玄踰往哲明情日夜深徽音歲時滅垣井總已平煙雲從容裔爾歎牛山悲我悼驚川逝謝宣城詩集四詩紀五十六又類聚四十引缺絶哲裔逝五韻

body:
  text: 卷二梧桐賦植椅桐於廣囿嗟倏忽而成林依層楹而吐秀臨平臺而結陰乃抽葉於露始亦結實於星沈聳輕條而麗景涵清風而散音發雅詠於悠昔流素賞之在今必鸞鳳而後集何燕雀之能臨匪伊楚宮側豈獨嶧山岑邈蒿萊之難儷永配道於仙琴初學記二十八請停臺使檢課表請停臺使檢課表前臺使督逋切調恆聞相望於道及臣至郡亦殊不疏凡此輩使人既非詳慎勤順或貪險崎嶇要求此役朝辭禁門情態即異暮宿村縣威福便行但令朱鼓裁完鈹槊微具顧眄左右叱吒自專擲宗斷族排輕斥重脅遏津埭恐喝傳郵破岡水逆商旅半引逼令到下先過己船浙江風猛公私畏渡脫舫在前驅令俱發呵蹙行民固其常理侮折守宰出變無窮既瞻郭望境便飛下嚴符但稱行臺未顯所督先訶強寺卻攝群曹開亭正㯓便振荊革其次絳標寸紙一日數至徵村切里俄刻十催四鄉所召莫辨枉直孩老士庶具令付獄或尺布之逋曲以當匹百錢餘稅且增為千或誑云質作尚方寄繫東冶萬姓駭迫人不自固遂漂衣敗力競致兼漿值今夕酒諧肉飫即許附申赦格明日禮輕貨薄便復不入恩科筐貢微闕箠撻肆情風塵毀謗隨忿而發及其豚蒜轉積鵝粟漸盈遠則分鬻他境近則託貿吏民反請郡邑助民申緩回刺言臺推信在所如聞頃者令長守牧離此每實非復近歲愚謂凡諸檢課宜停遣使密畿州郡則指賜敕令遙外鎮宰明下條源既各奉別旨人競自罄雖復臺使盈湊會取正屬所辦徒相疑僨反更淹懈凡預衣冠荷恩盛世多以暗緩貽愆少為欺猾入罪若類以宰牧乖政則觸事難委不容課逋上綱偏覺非才但賒促差降各限一期如乃事速應緩自依違糾坐之坐之之科不必須重但令必行期在可肅且兩裝之船充擬千緒三坊寡役呼訂萬計每一事之發彌晨方辦粗計近遠率遣一部職散人領無減二十舟船所資皆復稱是長江萬里費固倍之較略一年脫得省者息船優役實為不少兼折姦減竊遠近暫安南齊書竟陵王子良傳又略見通典五修治塘遏表修治塘遏表京尹雖居都邑而境壤兼跨廣袤周輪幾將千里縈原抱隰其處甚多舊遏古塘非唯一所而民貧業廢地利久蕪近啓遣五官殷濔典籤劉僧瑗到諸縣循履得丹陽溧陽永世等四縣解並村耆辭列堪墾之田合計荒熟有八千五百五十四頃修治塘遏可用十一萬八千餘夫一春就功便可成立南齊書竟陵王子良傳上讜言表臣聞明臺既闢承雲之歌闡衢室爰啓南風之頌流莫非降道爝輝紆靈浸澤陛下凝慶協圖席昌屬曆乾臨冬曖海鏡春亭選議鈞俗觀風調紀垂聽革之典降聆金之訓用能詩史無輟工頌有聞是故置四輔立七諫正國度針王闕臣謂當今宜崇諫司專事昭塞職蹈謇諤績宣王文則優其寵秩厚其節禮庶獻鮮之美方高聖代至乃靡衣偷食曾宇雕墉商貨浮侈田萊蕪替棫朴爽流摽梅失序勉民觀俗之宜設官立事之要隨闕興規袞廢能補如此則壤詠無遠轅樂可追藝文類聚二十四錢法表頃錢貴物賤殆欲兼倍凡在觸類莫不如茲稼穡艱劬斛直數十機杼勤苦匹才三百所以然者實亦有由年常歲調既有定期僮恤所上咸是見直東間錢多翦鑿鮮復完者公家所受必須圓大以兩代一困於無所鞭箠實繁益致無聊通典九陳時政密啓陳時政密啓臣思水潦成患良田沃壤變為汙澤農政告祥因高肆務播植既周繼以旱虐黔庶呼嗟相視褫氣夫國資於民民資於食匪食匪民何以能政臣每一念此寢不便席本始中郡國大旱宣帝下詔除民租今聞所在逋餘尚多守宰嚴期兼夜課切新稅力尚無從故調於何取給政當相驅為盜耳愚謂逋租宜皆原除少降停恩微紓民命自宋道無章王風陵替竊官假號駢門連室今左民所檢動以萬數漸漬之來非復始適一朝洗正理致沸騰小人之心罔思前咎董之以威反怨後罰獸窮則觸事在匪輕齊有天下日淺恩洽未布一方或飢當加優養愚謂自可依源削除未宜便充猥役且部曹檢校誠存精密令史姦黠鮮不容情情既有私理或枉謬耳目可限群狡無極變易是非居然可見詳而後取於事未遲明詔深矜獄圄恩文纍墜今科網嚴重稱為峻察負罪離愆充積牢戶暑時鬱蒸加以金鐵聚憂之氣足感天和民之多怨非國福矣頃土木之務甚為殷廣雖役未及民勤費已積炎旱致災或由於此皇明載遠書軌未一緣淮帶江數州地耳以魏方漢猶一郡之譬以今比古復為遠矣何得不愛其民緩其政救其危存其命哉湘區奧密蠻寇熾強如聞南師未能挫戮百姓齊民積年塗炭疽食侵淫邊虞方重交州敻絶一垂實惟荒服恃遠後賓固亦恆事自青德啓運款關受職置之度外不足絓言今縣軍遠伐經途萬里衆寡事殊客主勢異以逸待勞全勝難必又緣道調兵以足軍力民丁烏合事乖習鋭廣州積歲無年越州兵糧素乏加以發借必致恇擾愚謂叔獻所請不宜聽從取亂侮亡更俟後會雖緩歲月必有可禽之理差息發動費役之勞劉楷見甲以助湘中威力既舉蟻寇自服南齊書竟陵王子良傳又啓臣一月入朝六登文陛廣殿稠人裁奉顏色縱有所懷豈敢自達比天眚亟見地孽亟臻民下妖訛好生噂誻穀價雖和比室飢嗛縑纊雖賤駢門裸質臣一念此每入心骨三吳奧區地惟河輔百度所資罕不自出宜在蠲優使其全富而守宰相繼務在裒剋圍桑品屋以準資課致令斬樹發瓦以充重賦破民財産要利一時東郡使民年無常限在所相承準令上直每至州臺使命切求懸急應充猥役必由窮困乃有畏失嚴期自殘軀命亦有斬絶手足以避徭役生育弗起殆為恆事守長不務先富民而唯言益國豈有民貧於下而國富於上邪又泉鑄歲遠類多翦鑿江東大錢十不一在公家所受必須輪郭完全遂買本一千加子七百猶求請無地捶革相驅尋完者為用既不兼兩回復遷貿會非委積徒令小民每嬰困苦且錢帛相半為制永久或聞長宰須令輸直進違舊科退容姦利八屬近縣既在京畿發借徵調實煩他邑民特尤貧連年失稔草衣藿食稍有流亡今農政就興宜蒙賑給若逋課未上許以申原兗豫二藩雖曰舊鎮往屬兵虞纍棄鄉土密邇寇庭下無安志編草結菴不違涼暑扶淮聚洛靡有生向俱稟人靈獨絶溫飽而賦斂多少向均沃實謂凡在荒民應加蠲減又司市之要自昔所難頃來此役不由才舉並條其重資許以賈衒前人增估求俠後人加稅請代如此輪回終何紀極兼復交關津要共相脣齒愚野未間必加陵誑罪無大小橫沒資載凡求試穀帛類非廉謹未解在事所以開容夫獄訟惟平畫一在制雖恩家得罪必宜申憲鼎姓貽愆最合從網若罰典惟加賤下辟書必蠲世族懼非先王立理之本尚書列曹上應乾象如聞命議所出先咨於都都既下意然後付郎謹寫關行愚謂郎官尤宜推擇宋運告終戎車屢駕寄名軍牒動竊數等故非分充朝資奉殷積廣越邦宰梁益郡邑參差調補實允事機且此徒冗雜罕遵王憲嚴加廉視隨違彈斥一二年間可減太半南齊書竟陵王子良傳又略見南史四十四通典五又啓伏尋三吳內地國之關輔百度所資民庶雕流日有困殆蠶農罕獲飢寒尤甚富者稍增其饒貧者轉鍾其斃可為痛心難以辭盡頃錢貴物賤殆欲兼倍凡在觸類莫不如茲稼穡難劬斛直數十機杼勤苦匹裁三百所以然者實亦有由年常歲調既有定期僮恤所上咸是見直民間錢多翦鑿鮮復完者公家所受必須員大以兩代一困於所貿鞭捶質繫益致無聊臣昔忝會稽粗間物俗塘丁所上本不入官良由陂湖宜壅橋路須通均夫訂直民自為用若甲分毀壞則年一修改若乙限堅完則終歲無役今郡通課此直悉以還臺租賦之外更生一調致令塘路崩蕪湖源泄散害民損政實此為劇建元初狡虜遊魂軍用殷廣浙東五郡丁稅一千乃有質賣妻兒以充此限道路愁窮不可聞見所逋尚多收上事絶臣登具啓聞即蒙蠲原而此年租課三分逋一明知徒足擾民實自斃國愚謂塘丁一條宜還復舊在所逋恤優量原除凡應受錢不限大小但令所在折市布帛若民有雜物是軍國所須者聽隨價準直不必一應送錢於公不虧其用在私實荷其渥昔晉氏初遷江左草創絹布所直十倍於今賦調多少因時增減永初中官布一匹直錢一千而民間所輸聽為九百漸及元嘉物價轉賤私貨則束直六千官受則匹準五百所以每欲優民必為降落今入官好布匹堪百餘其四民所送者猶依舊制昔為損上今為刻下氓庶空儉豈不由之救民拯斃莫過減賦時和歲稔尚爾虛乏儻值水旱寧可熟念且西京熾強實基三輔東都全固實賴三河歷代所同古今一揆石頭以外裁足自供府州方山以東深關朝廷根本夫股肱要重不可不恤宜蒙寬政少加優養略其目前小利取其長久大益無患民資不殷國財不阜也宗臣重寄咸云利國竊如愚管未見可安南齊書王敬則傳又見通典五又十一車制啓車制啓臣聞車旗有章載自前史器必依禮服無舛法凡蓋員象天軫方法地上無二天之儀下設兩蓋之飾求之志録殊為乖衷又假為麟首加乎馬頭事不師古鮮或可施南齊書輿服志永明初加玉輅為重蓋又作麒麟頭采畫以馬首戴之竟陵王子良啓又見通典六十四諫射雉啓鑾輿亟動天蹕屢巡陵犯風煙驅馳野澤萬乘至重一羽甚微從甚微之歡忽至重之誡頃郊郛以外科禁嚴重匪直芻牧事罷遂乃窀掩殆廢且田月向登桑時告至士女呼嗟易生噂議棄民從欲理未可安曩時巡幸必盡威防領軍景先詹事赤斧堅甲利兵左右屯衛今馳騖外野交侍疏闊晨出晚還頓遺清道此實愚臣最所震迫狡虜玩威甫獲款關二漢全富猶加曲待如聞使臣頻亦怨望前會東宮遂形言色昔宋氏遣使舊列階下劉纘銜使始登朝殿今既反命宜賜優禮愚謂中堂雲構實惟峻絶簷陛深嚴事隔涼暑而別為一室如或有疑邊帶廣途訛言孔熾毀立之易過於轉圓若依舊制通敞實允觀聽頃市司驅扇租估過刻吹毛求瑕廉察相繼被以小罪責以重備愚謂宜敕有司更詳優格臣年方朝賢齒未相及以管窺天猶知失得廊廟之士豈暗是非未聞一人開一説為陛下憂國家非但面從亦畏威耳臣若不啓陛下於何聞之南齊書竟陵王子良傳又諫射雉啓又諫射雉啓忽聞外議伏承當更射雉臣下情震越心懷憂悚猶謂疑妄事不必然伏度陛下以信心明照所以傾金寶於禪靈仁愛廣洽得使禽魚養命於江澤豈惟國慶民歡乃以翱翔治樂夫衛生保命人獸不殊重軀愛體彼我無異故禮云聞其聲不食其肉見其生不忍其死且萬乘之尊降同匹夫之樂夭殺無辜傷仁害福之本菩薩不殺壽命得長施物安樂自無恐怖不惱衆生身無患苦臣見功德有此果報所以日夜劬勤厲身奉法實願聖躬康豫若此每至寢夢脫有異見不覺身心立就燋爛陛下常日捨財修福臣私心顒顒尚恨其少豈可今日有見此事一損福業追悔便難臣此啓聞私心實切若是大事不可易改亦願陛下照臣此誠曲垂三思況此嬉遊之間非關當否而動輒傷生實可深慎臣聞子孝奉君臣忠事主莫不靈祇通感徵祥證登臣近段仰啓賜希受戒天心洞遠誠未達勝善之途而聖恩遲疑尚未垂履曲降尊極豈可今月復隨此事臣不隱心即實上啓南齊書竟陵王子良傳請加贈豫章王嶷啓請加贈豫章王嶷啓臣聞春秋所以稱王母弟者以尊其所重故也是以禮秩殊品爵命崇異在漢則梁王備出警入蹕之儀在晉則齊王具殊服九命之贈江左以來尊親是闕故致袞章之典廢而不傳實由人缺其位非禮虧省齊王故事與今不殊締構王業功迹不異凡有變革隨時之宜者政緣恩情有輕重德義有厚薄若事籌前規禮無異則且梁齊闕令終之美猶饗褒贈之榮況故大司馬仁和著於天性孝悌終於立身節義表於勤王寬猛彰於御物奉上無艱劬之貌接下無毀傷之容淡矣止於清貞無喜慍之色悠然栖於靜默絶馳競之聲詩云靡不有初鮮克有終夫終之者理實為難在於今行無廢斯德東平樂於小善河間悅於詩書勳績無聞艱危不涉尚致卓爾不群英聲萬代況今協贊皇基經綸霸始功業高顯清譽逾彰富貴隆重廉潔彌峻等古形今孰類茲美臣愚忖度未有斯例凡庶族同氣愛睦尚少豈有仰覩陛下垂友于之性若此者乎共起布衣俱登天貴生平遊處何事不同分甘均味何珍不等未嘗覩貌而天心不歡見形而聖儀不悅爰及臨危捨命親瞻喘息萬分之際沒在聖目號哭動乎天地感慟驚乎鬼神乃至撤膳移寢坐泣遷旦神儀損耗隔宿改容奉瞻聖顏誰不悲悚歷古所未聞記籍所不載既有若斯之大德而典服之贈不彰如其脫致虧忘追改為煩不令千載之下物有遺恨其德不具美者尚荷嘉隆之命況事光先烈者寧可缺茲盛典臣恐有識之人容致其議且庶族近代桓溫庾亮之類亦降殊命伏度天心已當有在南齊書豫章王嶷傳答張融此乃是長史美事恐朝有常典不得如長史所懷南齊書張融傳竟陵張欣時為諸暨令坐罪當死融啓竟陵王子良乞代欣時死子良答答顧憲之非君無以聞此德音梁書顧憲之傳竟陵王於宣城臨成定陵三縣界立屯封山澤數百里禁民樵采憲之固陳不可王答與安陸侯緬書竊承下風數十年來姑蘇未有此政南史四十一又南齊書安陸王緬傳緬為吳郡太守大著風績竟陵王子良與緬書答王僧虔書答王僧虔書辱告並五紙舉體精雋靈奧執玩反覆不能釋手雖太傅之婉媚玩好領軍之靜逖合緒方之蔑如也昔杜度殺字甚安而筆體微瘦崔瑗筆勢甚快而結字小疏君處二者之間亦猶仲尼方於季孟也夫工欲善其事必先利其器伯喈非流紈體素不妄下筆若子邑之紙妍妙輝光仲將之墨一點如漆伯英之筆窮神盡意妙物遠矣邈不可追遂令思挫於弱毫數屈於陋墨言之使人於邑若三珍尚存四寶斯覿何但尺素信札動見模式將一字徑丈方寸千言也承天涼體豫復欲繕寫一賦傾遲輝采心目俱勞承閲覽祕府備睹群迹崔張歸美於逸少雖一代所宗僕不見前古人之迹計亦無以過於逸少既妙盡深絶便當得之實録然觀前世稱目竊有疑焉崔杜之後共推張芝仲將謂之筆聖伯玉得其筋巨山得其骨索氏自謂其書銀鉤蠆尾談者誠得其宗劉德升為鍾胡所師兩賢并有肥瘦之斷元鳴獲釘壁之玩師宜致酒簡之多此亦不能止長胤狸骨右軍以為絶倫其功不可及繇此言之而向之論或至投杖聊呈一笑不妄言耳張彥遠法書要録載此誤與王僧虔論書混為一篇張懷瓘書斷引子邑之紙至邈不可追八句作竟陵王與僧虔書今據編入竟陵王集中與孔中丞稚圭書與孔中丞稚圭書覽君書具一二每患浮言之妨正道激烈之傷純和亦已久矣孟子有云君王無好智君王無好勇勇智之過生乎患禍所遵正當仁義為本今因修釋訓始見斯行之所發誓念履行欲卑高同其美且取解脫之喻不得不小失存其大至於形外之間自不足及言真俗之教其致一耳取之者未達故橫起異同君云積業栖信便是言行相舛豈有奉親一毀一敬而云大孝未之前聞夫仁人之行非是殘害加其美廉潔之操不藉貪竊成其德如此則三歸五戒豈得一念而可捨十善八正寧瞥想之可遺未見輕其本而能重其末所謂本既傾矣而後枝葉從之今云二途雖異何得相順此言故是見其淺近之談耳君非不覩經律所辨何為偏志一方埋沒通路夫士未嘗離俗施訓即世之教可以知之若云斯法空成詭妄更增疑惑應當毀滅就即因而言閨門孝悌者連鄉接黨竟有幾人今可得以無其多絓諸訓誥經史針誡悉可焚之不君今遲疑於內教亦復與此何殊哉所以歸心勝法者本不以禮敬標其心兢仰祗崇者不以在我故忘物今之殷勤克己者政為君輩之徒耳欲今相與去憍矜除慢慠節情欲制貪求修禮讓習謙恭奉仁義敦孝弟課之以博施廣之以泛愛賞之以英賢拔之以俊異復何慚於鬼神乎孜孜策勵良在於斯雖未有奉遵亦意不忘之今未有夜光之投而按劍已起欲相望於道德寧不多愧當繇未見此情故常信斯心耳在懷則不然每苦其不及司徒之府本五教是勸方共敦斯美行以率無欲使詭諂佞望門而自殄浮偽蕩逸踐庭而變迹等彼息心之館齊此無欲之臺不亦善乎一則仰順宸極普天之慈二則敬奉儲皇垂愛之善宵旦而警惕者正患此心無遂耳悠悠之語好自多端其云願善政言未知傷化之重儻令詭事以忠孝佞悅以仁義虛設以禮讓假枉以方直乃至一日克己天下歸仁況能旬朔有餘所望過矣本自開心所納正若此矯不多如其此煩未廣故鄙薄深慨君正應規諫其乖開發未達云何言傷孝本語損義基於邑有懷非所望也若此事可棄則欣聞餘善又云未必勸人持戒當令善繇下發必如此而弘教者放勛須四凶革而啓聖虞舜待商均賢而德明如斯而遂美其可望乎君之此意則應廣有所折便當詰堯以土階之儉嘉離宮之麗貶禹以茅茨之陋崇阿房之貴恥汲黯之正容榮祝鮀之媚色其餘節義貞信謙恭之德皆當改途而反面復何行之可修也凡聞於言必察其行覩於行必求於理若理不乖而行不越者請無造於異端且殊途同歸未必孱然一貫頃亦多有與君此意同者今寄言此紙情不專一者庴心於疑妄國君普宣示之略言其懷無見髣佛翰迹易煩終不盡意比見君別更委悉也夫人心之不同猶若其貌豈其容一而等其智乎鑒有待之參差足見情靈之乖舛矣一得其志者非言談之所盡一背其途者豈遊説之所翻見君雖復言面委盡而不及此處者良由彼我之見既異幸可各保其方差無須空構是非橫起謗議耳栖心入信者前良不無此志今以效善之為樂故挫憍陵以待物君若以德越往賢聖逾前修智超群類位極人貴者自可逍遙世表以道化物高尚其懷無求自足而退於前良恐未能懸絶空秉兩塗獨異勝法若悠悠相期本不及言意在不薄為復示斯懷耳比面別一二近聊有此釋滯兩卷想於外已當見之今送相示若已覽者付反幸無勞形目脫未覩者為可一歷意本不期他翻正是自釋疑滯耳君見之必當撫掌也弘明集十一答孔中丞書君此書甚佳宜廣示諸未達者弘明集十一與南郡太守劉景蕤書去冬因君與劉居士書今春得其返文辭趣翩翩足有才藻實子雲之筆札元瑜之書記伸復咨嗟彌用欽想此子含真抱璞比調雲霞背俗居幽寓歡林漵養志南荊可與卞寶爭價韜光梵服固同隋照共明雖顏段之栖遲偃仰揚鄭之寂寞恬淡取之若人信可同日而語矣且道性天悠禪心自謐敦悅九部研味三乘在家菩薩行之而不難白衣居士即之而匪易逝將燭昏霾於慧炬拯淪溺於法橋扇靈崿之留風鏡貞林之絶影僕栖尚既同情契彌至而悠悠京苑間以江山假復神通遠邇冥交曉曙疇得寫析深襟辨明幽旨迹生滅之中談究真俗之諦義故重有別書招來畿邑居問道之次具為敦請此蘭山桂水既足逍遙儒侶玄宗復多朋往非以一爵相加豈其旌蒲為分直暗投誠素庶必能玄了脫悠爾來儀想時加資遣也釋藏輕四廣弘明集十九致沙門法猷書致沙門法猷書遠法師一代名德志節清高潛山樹美四海餐風弟子暗昧謬蒙師範方欲仰稟仁化用洗煩慮不謂此疾奄然異世悲痛之心特不可忍遠上即既業行圓通曠劫希有弟子意不欲遺形影迹雜處衆僧墓中得別卜餘地是所願也方應樹剎表奇刻石銘德矣高僧傳八賓僚七要松既煙而接漢竹緣嶺而負筠哀過鴻於月曉悲夜猿於霜旻乃鶴駕之非遠信羽車之可鄰鴻池廣象太液染華勢含五水氣疏九河既百尋而照底亦千丈而分沙故乘流以神王或鼓地而目多豈能從我泛此安波藝文類聚五十七行宅詩序余稟性端疏屬愛間外往歲羈役浙東備歷江山之美名都勝境極盡登臨山原石道步步新情回池絶澗往往舊識以吟以詠聊用述心登山望雷居士精舍同沈右衛過劉先生墓下詩序沛國劉子圭學優未仕迹邇心遐履信體仁古之遺德潛舟迅景滅賞淪輝言念芳猷式懷嗟述屬舍弟隨郡有示來篇彌績久要之情益深宿草之歎升望西山率爾為答雖因事雷山實申悲劉子云爾淨住子序遺教經云波羅提木義是汝大師若住於世無異我也又云波羅提木義住則我法住波羅提木義滅則我法滅是故衆僧於望海再説禁戒謂之布薛外國云布薛此云淨住亦名長養亦名增進所謂淨住身口意身潔意如戒而住故曰淨住子者紹繼為義以沙門淨身口七支不起諸惡長養增進菩提善根如是修習成佛無差則能紹續三世佛種是佛之子故云淨住子廣弘明集二十七上眼銘惟正是視玄黃匪惑非禮不觀儀形是則慎爾所覿無愆斯德藝文類聚十七耳銘惟耳是聽仁愛是聞詳察巧言離辨異群無迷邪諂炫惑莫分藝文類聚十七口銘惟口是慎慎乎語笑三針是戒事重周廟戒之戒之無貽厥誚藝文類聚十七
